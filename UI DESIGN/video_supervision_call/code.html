            transition: all 0.1s ease-in-out;

        .btn-3d-red:active {

<!-- High-tech glass overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/30 pointer-events-none"></div>
<div class="absolute inset-0 border-[20px] border-black/20 pointer-events-none"></div>
<!-- HUD Elements -->

<div class="glass-panel px-4 py-2 rounded-xl flex flex-col">

<span class="material-symbols-outlined text-3xl">call_end</span>
</button>
<!-- Screen Share -->
<button class="w-12 h-12 rounded-full border border-white/10 hover:bg-white/10 transition-all flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-xl">screen_share</span>
</button>
<!-- More Options -->
<button class="w-12 h-12 rounded-full border border-white/10 hover:bg-white/10 transition-all flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Suppressed as per rules for Task-Focused screens, but kept hidden structural for layout logic if needed) -->
<!-- The prompt defines a focused video screen, so global nav is suppressed to prioritize content canvas. -->
<script>
        // Micro-interactions for Buttons
        function toggleBtn(btnId, iconOn, iconOff) {
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('.material-symbols-outlined');
            const isActive = btn.dataset.active === 'true';

            if (isActive) {
                btn.classList.remove('opacity-50');
                btn.classList.add('btn-3d');
                icon.textContent = iconOn;
                btn.dataset.active = 'false';
            } else {
                btn.classList.add('opacity-50');
                btn.classList.remove('btn-3d');
                icon.textContent = iconOff;
                btn.dataset.active = 'true';
            }
        }

        // Simple Timer for Realism
        let seconds = 45903; // Start from 12:45:03
        setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            document.getElementById('session-timer').textContent = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }, 1000);

        // Add subtle noise texture via JS to avoid data-uri strings
        const addNoise = () => {
            const noise = document.createElement('div');
            noise.style.position = 'fixed';
            noise.style.top = '0';
            noise.style.left = '0';
            noise.style.width = '100vw';
            noise.style.height = '100vh';
            noise.style.pointerEvents = 'none';
            noise.style.opacity = '0.02';
            noise.style.zIndex = '9999';
            noise.style.background = `url("https://www.transparenttextures.com/patterns/carbon-fibre.png")`;
            document.body.appendChild(noise);
        };
        addNoise();
    </script>
